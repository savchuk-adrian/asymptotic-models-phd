name: phd_asymptotic
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.12  
  - numpy=1.24
  - scipy=1.10.1
  - numba=0.58
  - matplotlib
  - pandas
  - sympy
  - pip
  - ipykernel  
  - jupyter 
  - plotly
  - pip:
    - scienceplots
    - meshio
    - trimesh
    - gmsh
    - -e ./external  
    - -e .   